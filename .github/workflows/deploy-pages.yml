# Publishes the static Vite build to GitHub Pages (project site: /<repo>/).
# Set repo Settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Static build for Pages
        env:
          # Must match Vite base for a project site (assets + router).
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/
        run: npm run build:pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
